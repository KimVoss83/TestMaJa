  Object.entries(_ttToolMap).forEach(([btnId, tool]) => {
    const btn = document.getElementById(btnId);
    if (btn) btn.onclick = () => setTool(tool);
  });

  document.getElementById('tt-undo').onclick = () => undo();
}

// =========================================================
// MOBILE: THREE-DOT MENU
// =========================================================
function openMobileMenu() {
  document.getElementById('mobile-menu-backdrop').classList.add('visible');
  requestAnimationFrame(() => document.getElementById('mobile-menu').classList.add('visible'));
}
function closeMobileMenu() {
  document.getElementById('mobile-menu').classList.remove('visible');
  setTimeout(() => document.getElementById('mobile-menu-backdrop').classList.remove('visible'), 250);
}

document.getElementById('tt-more').onclick = openMobileMenu;
document.getElementById('mobile-menu-backdrop').onclick = closeMobileMenu;
document.getElementById('mm-upload').onclick = () => { closeMobileMenu(); document.getElementById('file-input').click(); };
document.getElementById('mm-save').onclick = () => { closeMobileMenu(); saveProject(); };
document.getElementById('mm-load').onclick = () => { closeMobileMenu(); document.getElementById('project-input').click(); };
document.getElementById('mm-export').onclick = () => { closeMobileMenu(); exportFeldaufnahme(); };
document.getElementById('mm-undo').onclick = () => { closeMobileMenu(); undo(); };
document.getElementById('mm-redo').onclick = () => { closeMobileMenu(); redo(); };
document.getElementById('mm-list').onclick = () => {
  closeMobileMenu();
  const drawer = document.getElementById('element-drawer');
  updateElementDrawer();
  drawer.classList.toggle('visible');
};
document.getElementById('mm-clear').onclick = () => {
  closeMobileMenu();
  createModal('Alles loschen?', '<p>Alle Elemente und Messungen werden geloscht.</p>', () => {
    canvas.getObjects().filter(o => !o._isBackground).forEach(o => canvas.remove(o));
    elements.length = 0;
    measurements.length = 0;
    elementId = 0;
    measurementId = 0;
    saveSnapshot();
    updateElementDrawer();
    showToast('Alles geloscht', 'info');
  });
};

// =========================================================
// MOBILE: FINISH BUTTON
// =========================================================
const _finishBtn = document.getElementById('mobile-finish-btn');

function _updateFinishBtn() {
  if (!_isTouchDevice) return;
  const showFinish =
    (state.tool === 'line' && state.linePoints.length >= 2) ||
    (state.tool === 'area' && state.areaPoints.length >= 3);
  if (showFinish) _finishBtn.classList.add('visible');
  else _finishBtn.classList.remove('visible');
}

if (_isTouchDevice) {
  _finishBtn.addEventListener('click', () => {
    if (state.tool === 'line' && state.linePoints.length >= 2) finishLine();
    else if (state.tool === 'area' && state.areaPoints.length >= 3) finishArea();
    _finishBtn.classList.remove('visible');
    _mobileMag.hide();
    _hideMobileCrosshair();
  });
}

// =========================================================
// MOBILE MAGNIFIER
// =========================================================
const _mobileMag = (() => {
  if (!_isTouchDevice) return { show() {}, hide() {}, updateStart() {}, updateEnd() {}, hideStart() {}, hideEnd() {}, active: false };

  const SIZE = 130, ZOOM = 4;
  const dpr = () => window.devicePixelRatio || 1;

  function createMagCanvas(container) {
    const c = document.createElement('canvas');
    container.insertBefore(c, container.firstChild);
    const d = dpr();
    c.width = SIZE * d; c.height = SIZE * d;
    c.style.width = SIZE + 'px'; c.style.height = SIZE + 'px';
    return { canvas: c, ctx: c.getContext('2d') };
  }

  const startEl = document.getElementById('mobile-mag-start');
  const endEl = document.getElementById('mobile-mag-end');
  const startMag = createMagCanvas(startEl);
  const endMag = createMagCanvas(endEl);

  function renderMag(mag, canvasX, canvasY, color) {
    const d = dpr();
    const ctx = mag.ctx;
    const c = mag.canvas;
    if (c.width !== SIZE * d) {
      c.width = SIZE * d; c.height = SIZE * d;
      c.style.width = SIZE + 'px'; c.style.height = SIZE + 'px';
    }
    const vpt = canvas.viewportTransform;
    const screenX = canvasX * vpt[0] + vpt[4];
    const screenY = canvasY * vpt[3] + vpt[5];
    const cpx = screenX * d, cpy = screenY * d;
    const srcW = (SIZE / ZOOM) * d, srcH = (SIZE / ZOOM) * d;
    const srcX = cpx - srcW / 2, srcY = cpy - srcH / 2;
    ctx.clearRect(0, 0, SIZE * d, SIZE * d);
    try { ctx.drawImage(canvas.lowerCanvasEl, srcX, srcY, srcW, srcH, 0, 0, SIZE * d, SIZE * d); } catch(_) {}
    ctx.save();
    ctx.scale(d, d);
    const h = SIZE / 2, GAP = 6;
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    ctx.beginPath(); ctx.arc(h, h, GAP + 1, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = color || 'rgba(210,30,30,0.92)';
    ctx.lineWidth = 1.2;
    ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(0, h); ctx.lineTo(h - GAP, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(h + GAP, h); ctx.lineTo(SIZE, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(h, 0); ctx.lineTo(h, h - GAP); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(h, h + GAP); ctx.lineTo(h, SIZE); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = color || 'rgba(210,30,30,1)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(h, h, 2.5, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  let _active = false;
  return {
    get active() { return _active; },
    updateStart(x, y, c) { startEl.classList.add('visible'); _active = true; renderMag(startMag, x, y, c); },
    updateEnd(x, y, c) { endEl.classList.add('visible'); _active = true; renderMag(endMag, x, y, c); },
    hideStart() { startEl.classList.remove('visible'); },
    hideEnd() { endEl.classList.remove('visible'); },
    show() { _active = true; },
    hide() { _active = false; startEl.classList.remove('visible'); endEl.classList.remove('visible'); },
  };
})();

// =========================================================
// MOBILE CROSSHAIR
// =========================================================
const _crosshairEl = document.getElementById('mobile-crosshair');
function _showMobileCrosshair(clientX, clientY) {
  _crosshairEl.style.left = clientX + 'px';
  _crosshairEl.style.top = clientY + 'px';
  _crosshairEl.classList.add('visible');
}
function _hideMobileCrosshair() {
  _crosshairEl.classList.remove('visible');
}

// =========================================================
// MOBILE: TOUCH STATE MACHINE
// =========================================================
let _touchState = { type: null, lastDist: 0, lastMid: null, startTime: 0 };
const _PINCH_COOLDOWN_MS = 350;
let _pinchCooldownUntil = 0;
let _touchSuppressClick = false;
let _mobileAdjust = { active: false, lastCanvasPos: null };

function _getCanvasPtrFromTouch(touch) {
  return canvas.getPointer({
    clientX: touch.clientX, clientY: touch.clientY,
    pageX: touch.pageX, pageY: touch.pageY,
  });
}

function _touchOnOverlay(e) {
  const overlay = document.getElementById('drop-overlay');
  return overlay && !overlay.classList.contains('hidden') && overlay.contains(e.target);
}

// Prevent iOS bounce/zoom
wrapper.addEventListener('touchmove', e => {
  if (_touchOnOverlay(e)) return;
  if (e.touches.length >= 2 || state.tool !== 'select') {
    e.preventDefault();
  }
}, { passive: false });

function _updateMobileMagnifiers(p) {
  const col = 'rgba(230,81,0,0.92)';
  let hasStart = false;

  if (state.tool === 'line' && state.linePoints.length >= 1) {
    const last = state.linePoints[state.linePoints.length - 1];
    _mobileMag.updateStart(last.x, last.y, col);
    hasStart = true;
  } else if (state.tool === 'area' && state.areaPoints.length >= 1) {
    const last = state.areaPoints[state.areaPoints.length - 1];
    _mobileMag.updateStart(last.x, last.y, col);
    hasStart = true;
  }

  if (hasStart) {
    _mobileMag.updateEnd(p.x, p.y, col);
  } else {
    _mobileMag.updateStart(p.x, p.y, col);
    _mobileMag.hideEnd();
  }
}

if (_isTouchDevice) {
  const DRAWING_TOOLS = ['point', 'line', 'area'];

  // Capture phase: intercept touch BEFORE Fabric.js
  canvas.upperCanvasEl.addEventListener('touchstart', e => {
    if (!DRAWING_TOOLS.includes(state.tool)) return;
    if (!state.backgroundImage) return;
    if (e.touches.length !== 1) return;
    if (Date.now() < _pinchCooldownUntil) return;

    e.preventDefault();
    e.stopImmediatePropagation();

    _touchSuppressClick = true;
    _mobileAdjust.active = true;

    const touch = e.touches[0];
    const p = _getCanvasPtrFromTouch(touch);
    _mobileAdjust.lastCanvasPos = p;

    _showMobileCrosshair(touch.clientX, touch.clientY);
    _updateMobileMagnifiers(p);
  }, { capture: true, passive: false });

  canvas.upperCanvasEl.addEventListener('touchmove', e => {
    if (!_mobileAdjust.active || e.touches.length !== 1) return;
    e.preventDefault();
    e.stopImmediatePropagation();

    const touch = e.touches[0];
    const p = _getCanvasPtrFromTouch(touch);
    _mobileAdjust.lastCanvasPos = p;

    _showMobileCrosshair(touch.clientX, touch.clientY);

    const snapped = snapToPixel(p);

    // Update preview for line tool
    if (state.tool === 'line' && state.linePoints.length >= 1 && state.drawingLine) {
      const pts = state.linePoints.map(pp => ({ x: pp.x, y: pp.y }));
      pts.push(snapped);
      canvas.remove(state.drawingLine);
      state.drawingLine = new fabric.Polyline(pts, {
        stroke: ELEMENT_COLOR, strokeWidth: LINE_WIDTH, fill: 'transparent',
        selectable: false, evented: false, _tempDraw: true,
      });
      canvas.add(state.drawingLine);
    }

    // Update preview for area tool
    if (state.tool === 'area' && state.areaPoints.length >= 1) {
      if (state.drawingPolygon) canvas.remove(state.drawingPolygon);
      const pts = [...state.areaPoints, snapped];
      if (pts.length >= 3) {
        state.drawingPolygon = new fabric.Polygon(pts.map(pp => ({ x: pp.x, y: pp.y })), {
          stroke: ELEMENT_COLOR, strokeWidth: LINE_WIDTH, fill: 'rgba(230,81,0,0.15)',
          selectable: false, evented: false, _tempDraw: true,
        });
      } else {
        state.drawingPolygon = new fabric.Polyline(pts.map(pp => ({ x: pp.x, y: pp.y })), {
          stroke: ELEMENT_COLOR, strokeWidth: LINE_WIDTH, fill: 'transparent',
          selectable: false, evented: false, _tempDraw: true,
        });
      }
      canvas.add(state.drawingPolygon);
    }

    _updateMobileMagnifiers(snapped);
    throttledRender();
  }, { capture: true, passive: false });

  canvas.upperCanvasEl.addEventListener('touchend', e => {
    if (!_mobileAdjust.active) return;
    e.stopImmediatePropagation();

    _mobileAdjust.active = false;
    _touchSuppressClick = false;
    _hideMobileCrosshair();
    haptic('light');

    const touch = e.changedTouches[0];
    const p = _getCanvasPtrFromTouch(touch);
    const snapped = snapToPixel(p);

    switch (state.tool) {
      case 'point': placePoint(snapped); break;
      case 'line': handleLineClick(snapped); break;
      case 'area': handleAreaClick(snapped); break;
    }

    _updateFinishBtn();
    _updateMobileMagnifiers(snapped);

    // Hide magnifiers when tool cycle is done
    if (state.tool === 'point') {
      _mobileMag.hide();
    }
  }, { capture: true });

  // Handle measure tool taps on mobile (separate, simpler handler)
  canvas.upperCanvasEl.addEventListener('touchstart', e => {
    if (state.tool !== 'measure') return;
    if (!state.backgroundImage) return;
    if (e.touches.length !== 1) return;
    if (Date.now() < _pinchCooldownUntil) return;

    e.preventDefault();
    e.stopImmediatePropagation();

    const touch = e.touches[0];
    const p = _getCanvasPtrFromTouch(touch);
    const snapped = snapToPixel(p);
    handleMeasureClick(snapped);
  }, { capture: true, passive: false });

  // Handle select tool taps on mobile
  canvas.upperCanvasEl.addEventListener('touchstart', e => {
    if (state.tool !== 'select') return;
    if (e.touches.length !== 1) return;
    if (Date.now() < _pinchCooldownUntil) return;
    // Don't intercept — let it pass to Fabric for pan in touchmove
  }, { capture: true, passive: true });
}

// =========================================================
// PINCH + PAN (Bubbling phase)
// =========================================================
wrapper.addEventListener('touchstart', e => {
  if (_touchOnOverlay(e)) return;

  if (e.touches.length === 2) {
    e.preventDefault();
    _touchSuppressClick = true;
    if (_mobileAdjust.active) { _mobileAdjust.active = false; _hideMobileCrosshair(); }
    _touchState.type = 'pinch';
    _touchState.lastDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    _touchState.lastMid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };
    return;
  }

  if (e.touches.length === 1) {
    if (Date.now() < _pinchCooldownUntil) {
      _touchSuppressClick = true;
      _touchState.type = 'cooldown';
      return;
    }
    _touchState.type = 'single';
    _touchState.startTime = Date.now();
    _touchState.lastMid = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: false });

wrapper.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && _touchState.type === 'pinch') {
    e.preventDefault();
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const mid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };
    const factor = dist / _touchState.lastDist;
    const rect = wrapper.getBoundingClientRect();
    setZoom(canvas.getZoom() * factor, { x: mid.x - rect.left, y: mid.y - rect.top });
    const dx = mid.x - _touchState.lastMid.x;
    const dy = mid.y - _touchState.lastMid.y;
    const vpt = canvas.viewportTransform.slice();
    vpt[4] += dx; vpt[5] += dy;
    canvas.setViewportTransform(vpt);
    _touchState.lastDist = dist;
    _touchState.lastMid = mid;
    return;
  }

  if (e.touches.length === 1 && _touchState.type === 'single' && state.tool === 'select') {
    e.preventDefault();
    const t = e.touches[0];
    if (_touchState.lastMid) {
      const dx = t.clientX - _touchState.lastMid.x;
      const dy = t.clientY - _touchState.lastMid.y;
      const vpt = canvas.viewportTransform.slice();
      vpt[4] += dx; vpt[5] += dy;
      canvas.setViewportTransform(vpt);
    }
    _touchState.lastMid = { x: t.clientX, y: t.clientY };
  }
}, { passive: false });

wrapper.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    if (_touchState.type === 'pinch') {
      _pinchCooldownUntil = Date.now() + _PINCH_COOLDOWN_MS;
      _touchSuppressClick = true;
    }
    _touchState.type = null;
    _touchState.lastMid = null;
  }
}, { passive: true });

// =========================================================
// ORIENTATION CHANGE
// =========================================================
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    canvas.setWidth(wrapper.clientWidth);
    canvas.setHeight(wrapper.clientHeight);
    canvas.renderAll();
  }, 200);
});

// Prevent double-tap zoom
document.addEventListener('dblclick', e => {
  if (_isTouchDevice) e.preventDefault();
}, { passive: false });

// =========================================================
// INIT: set default tool
// =========================================================
setTool('select');
</script>
