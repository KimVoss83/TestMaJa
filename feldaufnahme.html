<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#252627" />
  <title>Feldaufnahme</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f0f0f0;
      color: #2d2d2d;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    #header {
      background: #252627;
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #3a3a3a;
      flex-shrink: 0;
      z-index: 10;
    }
    #header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #header .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #header .header-actions button,
    #header .header-actions .file-trigger {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }
    #header .header-actions button:hover,
    #header .header-actions .file-trigger:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }
    #header .header-actions .header-divider {
      width: 1px; height: 24px; background: #3a3a3a; margin: 0 4px;
    }

    /* ── Canvas ── */
    #canvas-wrapper { flex: 1; overflow: hidden; position: relative; background: #f0f0f0; }
    canvas { display: block; }

    /* ── Zoom HUD ── */
    #zoom-hud {
      position: absolute;
      bottom: 14px; right: 14px;
      background: rgba(0,0,0,0.48);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 12px; font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      user-select: none;
    }
    #zoom-hud.visible { opacity: 1; }
    #zoom-hud.fading { opacity: 0; transition: opacity 0.6s; }

    /* ── Drop overlay ── */
    #drop-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      pointer-events: auto;
      z-index: 50;
      background: #f0f0f0;
    }
    #drop-overlay.hidden { display: none; }

    /* ── Status bar (mobile) ── */
    #status-bar {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 600;
      background: rgba(40,40,50,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      padding: 6px 16px;
      padding-top: max(6px, env(safe-area-inset-top));
    }
    html.touch-device #status-bar.visible { display: block; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      padding: 16px;
    }
    .modal {
      background: #ffffff;
      border-radius: 12px;
      padding: 24px 22px;
      width: 340px;
      max-width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px #e5e7eb;
      display: flex;
      flex-direction: column;
    }
    .modal h2 { color: #2d2d2d; margin-bottom: 12px; font-size: 16px; font-weight: 700; }
    .modal p { font-size: 13px; color: #6b7280; margin-bottom: 12px; line-height: 1.5; }
    .modal input, .modal select {
      width: 100%; padding: 8px 11px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px; color: #2d2d2d; font-size: 14px;
      margin-bottom: 10px; font-family: inherit;
      transition: border-color 0.3s;
    }
    .modal input:focus, .modal select:focus {
      outline: none; border-color: #8B3DFF; background: #fff;
    }
    .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
    .modal .btn-row button {
      padding: 7px 16px; border-radius: 8px;
      font-size: 13.5px; font-weight: 500;
    }
    #modal-ok { background: #8B3DFF !important; color: #fff !important; }
    #modal-ok:hover { background: #7B2FBE !important; }
    .modal .perp-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #636366;
      margin-bottom: 10px; margin-top: -4px;
    }
    @media (max-width: 480px) {
      .modal { width: 94vw; padding: 18px 16px; }
    }

    /* ── Buttons ── */
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #374151;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    button:hover { background: #f3f4f6; color: #2d2d2d; }
    button.active { background: #f0ebff; color: #7B2FBE; font-weight: 600; }
    button:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    /* ── Touch-Hilfsstil ── */
    html.touch-device { overflow: hidden; position: fixed; width: 100%; height: 100%; }
    html.touch-device body { position: fixed; width: 100%; height: 100%; }
    html.touch-device #header { display: none !important; }
    html.touch-device #zoom-hud { font-size: 16px; bottom: 60px; }

    /* ── Mobile Magnifier Circles ── */
    .mobile-mag {
      display: none;
      position: fixed;
      top: 12px;
      width: 130px; height: 130px;
      border-radius: 50%;
      border: 2.5px solid rgba(0,0,0,0.22);
      box-shadow: 0 4px 20px rgba(0,0,0,0.22), inset 0 0 0 1.5px rgba(255,255,255,0.5);
      overflow: hidden;
      pointer-events: none;
      z-index: 9998;
      background: #fff;
    }
    .mobile-mag canvas { display: block; }
    .mobile-mag-label {
      position: absolute;
      bottom: 6px; left: 0; right: 0;
      text-align: center;
      font-size: 9px; font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      pointer-events: none;
    }
    #mobile-mag-start { left: 12px; }
    #mobile-mag-end { right: 12px; }
    html.touch-device .mobile-mag.visible { display: block; }

    /* ── Mobile Crosshair ── */
    #mobile-crosshair {
      display: none;
      position: fixed;
      width: 120px; height: 120px;
      pointer-events: none;
      z-index: 500;
      transform: translate(-50%, -50%);
    }
    #mobile-crosshair.visible { display: block; }
    #mobile-crosshair .ch-h,
    #mobile-crosshair .ch-v {
      position: absolute;
      background: rgba(210,30,30,0.75);
    }
    #mobile-crosshair .ch-h {
      left: 0; right: 0; top: 50%;
      height: 1.5px; transform: translateY(-0.75px);
    }
    #mobile-crosshair .ch-v {
      top: 0; bottom: 0; left: 50%;
      width: 1.5px; transform: translateX(-0.75px);
    }
    #mobile-crosshair .ch-dot {
      position: absolute;
      left: 50%; top: 50%;
      width: 10px; height: 10px;
      border: 1.5px solid rgba(210,30,30,0.9);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.5);
    }

    /* ── Mobile Finish Button ── */
    #mobile-finish-btn {
      display: none;
      position: fixed;
      bottom: 74px; right: 16px;
      z-index: 495;
      min-width: 56px; min-height: 56px;
      border-radius: 50%;
      border: none;
      background: #7B2FBE;
      color: #fff;
      font-size: 24px; font-weight: 700;
      box-shadow: 0 4px 16px rgba(123,47,190,0.4);
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      align-items: center;
      justify-content: center;
    }
    html.touch-device #mobile-finish-btn.visible { display: flex; }

    /* ── Mobile Bottom Toolbar ── */
    #touch-toolbar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 490;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,0,0,0.08);
      padding: 4px 4px;
      padding-bottom: max(4px, env(safe-area-inset-bottom));
      flex-direction: row;
      justify-content: space-around;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #touch-toolbar::-webkit-scrollbar { display: none; }
    html.touch-device #touch-toolbar { display: flex; }
    #touch-toolbar button {
      flex: 0 0 auto;
      min-width: 44px; min-height: 44px;
      border: none; background: transparent;
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 9px; font-weight: 600; color: #666;
      font-family: inherit;
      cursor: pointer;
      padding: 2px 6px;
      gap: 1px;
    }
    #touch-toolbar button svg { width: 22px; height: 22px; }
    #touch-toolbar button.active { background: #f0ebff; color: #7B2FBE; }
    #touch-toolbar button.active.tool-element { background: rgba(230,81,0,0.1); color: #E65100; }
    #touch-toolbar button.active.tool-reference { background: rgba(25,118,210,0.1); color: #1976D2; }
    #touch-toolbar .tt-sep {
      width: 1px; height: 28px; background: rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    @media (orientation: landscape) {
      #touch-toolbar button span { display: none; }
      #touch-toolbar button { min-width: 40px; padding: 4px; }
    }

    /* ── Mobile Onboarding Overlay ── */
    #mobile-onboarding {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.82);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 28px;
      color: #fff;
      font-family: inherit;
    }
    #mobile-onboarding.visible { display: flex; }
    #mobile-onboarding .ob-step {
      display: flex; align-items: flex-start; gap: 14px; max-width: 320px;
    }
    #mobile-onboarding .ob-num {
      flex: 0 0 auto;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #7B2FBE;
      color: #fff;
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    #mobile-onboarding .ob-text {
      font-size: 15px; line-height: 1.45; color: rgba(255,255,255,0.92);
    }
    #mobile-onboarding .ob-text strong { color: #fff; }
    #mobile-onboarding .ob-dismiss {
      margin-top: 8px;
      padding: 12px 36px;
      border: none;
      border-radius: 12px;
      background: #7B2FBE;
      color: #fff;
      font-size: 15px; font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }

    /* ── Mobile Menu ── */
    #mobile-menu-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 9000;
    }
    #mobile-menu-backdrop.visible { display: block; }
    #mobile-menu {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 9001;
      background: #252627;
      border-radius: 16px 16px 0 0;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      max-height: 70vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.25s ease-out;
    }
    #mobile-menu.visible {
      display: block;
      transform: translateY(0);
    }
    #mobile-menu .mm-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      margin: 0 auto 12px;
    }
    #mobile-menu .mm-section { margin-bottom: 12px; }
    #mobile-menu .mm-section-title {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    #mobile-menu .mm-row {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .mm-btn {
      flex: 0 0 auto;
      padding: 8px 14px !important;
      border-radius: 10px !important;
      background: rgba(255,255,255,0.08) !important;
      color: #ccc !important;
      font-size: 12px !important;
      font-weight: 500 !important;
      display: inline-flex !important;
      align-items: center !important;
      gap: 6px !important;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .mm-btn svg { width: 16px; height: 16px; }
    .mm-btn:active { background: rgba(255,255,255,0.16) !important; }
    .mm-btn.danger { color: #ff6b6b !important; }

    /* ── Element list drawer ── */
    #element-drawer {
      display: none;
      position: fixed;
      bottom: 56px;
      bottom: calc(56px + env(safe-area-inset-bottom));
      left: 0; right: 0;
      z-index: 488;
      max-height: 55vh;
      background: #fff;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.12);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px;
    }
    #element-drawer.visible { display: block; }
    .drawer-title {
      font-size: 12px; font-weight: 700; color: #2d2d2d;
      margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-section-title {
      font-size: 10px; font-weight: 700; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin: 10px 0 4px;
    }
    .el-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 6px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .el-item:last-child { border-bottom: none; }
    .el-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .el-icon.cat-element { background: rgba(230,81,0,0.12); color: #E65100; }
    .el-icon.cat-reference { background: rgba(25,118,210,0.1); color: #1976D2; }
    .el-label { flex: 1; font-weight: 500; }
    .el-type { font-size: 10px; color: #9ca3af; }
    .el-delete {
      padding: 4px 8px !important;
      color: #dc2626 !important;
      font-size: 11px !important;
      background: transparent !important;
    }
    .meas-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
      color: #636366;
    }
    .meas-value {
      font-weight: 700;
      color: #2d2d2d;
      margin-left: auto;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    Feldaufnahme
  </h1>
  <div class="header-actions">
    <label for="file-input" class="file-trigger">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Bild laden
    </label>
    <input type="file" id="file-input" accept="image/*,application/pdf" style="display:none;" />
    <div class="header-divider"></div>
    <button id="btn-save">Speichern</button>
    <button id="btn-load-project">Laden</button>
    <input type="file" id="project-input" accept=".json" style="display:none;" />
    <div class="header-divider"></div>
    <button id="btn-export">Exportieren</button>
  </div>
</div>

<div id="canvas-wrapper">
  <canvas id="c"></canvas>
  <div id="zoom-hud">100%</div>
  <div id="drop-overlay">
    <div style="opacity:0.18;margin-bottom:14px;">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div style="font-size:17px;font-weight:600;color:#3c3c43;margin-bottom:6px;">Bild oder PDF laden</div>
    <div style="font-size:13px;color:#8e8e93;">
      <label for="file-input" class="file-trigger"
        style="color:#8B3DFF;font-weight:600;font-size:15px;padding:12px 20px;display:inline-block;cursor:pointer;">
        Datei auswahlen
      </label>
      <span class="drop-hint-desktop" style="display:block;margin-top:4px;font-size:12px;">oder hierher ziehen</span>
    </div>
  </div>
</div>

<div id="status-bar"></div>

<div id="mobile-mag-start" class="mobile-mag"><span class="mobile-mag-label">A</span></div>
<div id="mobile-mag-end" class="mobile-mag"><span class="mobile-mag-label">B</span></div>
<div id="mobile-crosshair"><div class="ch-h"></div><div class="ch-v"></div><div class="ch-dot"></div></div>
<button id="mobile-finish-btn" title="Abschliessen">&#10003;</button>

<div id="mobile-onboarding">
  <div class="ob-step">
    <span class="ob-num">1</span>
    <span class="ob-text"><strong>Tippen</strong> — setzt einen Punkt mit Fadenkreuz</span>
  </div>
  <div class="ob-step">
    <span class="ob-num">2</span>
    <span class="ob-text"><strong>Ziehen</strong> — Punkt genau positionieren (Lupe zeigt Detail)</span>
  </div>
  <div class="ob-step">
    <span class="ob-num">3</span>
    <span class="ob-text"><strong>Loslassen</strong> — Punkt wird bestatigt</span>
  </div>
  <div class="ob-step">
    <span class="ob-num">&#10003;</span>
    <span class="ob-text">Bei Linie: <strong>&#10003;-Button</strong> drucken zum Abschliessen</span>
  </div>
  <button class="ob-dismiss" id="mobile-ob-dismiss">Verstanden</button>
</div>

<div id="element-drawer"></div>

<div id="touch-toolbar">
  <!-- Auswahl -->
  <button id="tt-select" title="Auswahl">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
    <span>Auswahl</span>
  </button>
  <div class="tt-sep"></div>
  <!-- Element tools (orange) -->
  <button id="tt-element-line" class="tool-element" title="Element-Linie">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 20 8 10 14 14 20 4"/></svg>
    <span>E-Linie</span>
  </button>
  <button id="tt-element-point" class="tool-element" title="Element-Punkt">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="22"/><line x1="2" y1="12" x2="7" y2="12"/><line x1="17" y1="12" x2="22" y2="12"/></svg>
    <span>E-Punkt</span>
  </button>
  <div class="tt-sep"></div>
  <!-- Reference tools (blue) -->
  <button id="tt-ref-line" class="tool-reference" title="Referenz-Linie">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 2"><polyline points="4 20 8 10 14 14 20 4"/></svg>
    <span>R-Linie</span>
  </button>

<script>
// =========================================================
// TOUCH DETECTION
// =========================================================
const _isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (_isTouchDevice) document.documentElement.classList.add('touch-device');

// =========================================================
// CONSTANTS
// =========================================================
const ELEMENT_COLOR    = '#E65100';   // orange — Leitungen
const REFERENCE_COLOR  = '#1976D2';   // blue  — Grenzen/Wände
const CONSTRAINT_COLOR = '#888';      // gray  — Massketten
const MARKER_RADIUS    = 6;
const LINE_WIDTH       = 2.5;
const LABEL_FONT_SIZE  = 12;

const DRAWING_TOOLS = ['element-line', 'element-point', 'ref-line', 'ref-point'];
const LINE_TOOLS    = ['element-line', 'ref-line'];
const POINT_TOOLS   = ['element-point', 'ref-point'];

function categoryColor(cat) {
  return cat === 'reference' ? REFERENCE_COLOR : ELEMENT_COLOR;
}

// =========================================================
// STATE
// =========================================================
const state = {
  tool: 'select',
  backgroundImage: null,
  backgroundInfo: null,
  imgDisplayScale: 1,
  zoom: 1,
  panning: false,
  lastPan: null,
  spacePan: false,
  linePoints: [],
  drawingLine: null,
  measureStep: 0,
  measureFromId: null,
  measureFromAnchor: null,
  selectedElementId: null,
};

let elementId = 0;
const elements = [];
// { id, type: 'point'|'line', category: 'element'|'reference',
//   label, position:{x,y} | points:[{x,y},...] }

let constraintId = 0;
const constraints = [];
// { id, elementId, refId, value_m, type:'perpendicular'|'point-to-point',
//   elementAnchor:{type:'segment',index}|{type:'knick',index},
//   refAnchor:{type:'point'}|{type:'line'}|{type:'knick',index} }

// =========================================================
// CANVAS
// =========================================================
const wrapper = document.getElementById('canvas-wrapper');
const canvas = new fabric.Canvas('c', {
  width: wrapper.clientWidth,
  height: wrapper.clientHeight,
  selection: false,
  backgroundColor: '#e8e8e8',
});

// =========================================================
// CANVAS SERIAL PROPS (for undo/redo)
// =========================================================
const CANVAS_SERIAL_PROPS = [
  '_elementId', '_elementType', '_elementCategory', '_constraintId',
  '_isBackground', '_noSelect', '_tempDraw', '_highlightGlow', '_knickIndex',
];

// =========================================================
// UNDO / REDO
// =========================================================
const history = { past: [], future: [], MAX: 40, _paused: false, _restoring: false };

function getSnapshot() {
  const json = canvas.toJSON(CANVAS_SERIAL_PROPS);
  json.objects = (json.objects || []).filter(o => !o._isBackground && !o._tempDraw);
  return {
    canvas: JSON.stringify(json),
    elements: JSON.stringify(elements),
    constraints: JSON.stringify(constraints),
    elementId: elementId,
    constraintId: constraintId,
  };
}

function saveSnapshot() {
  if (history._paused) return;
  history.past.push(getSnapshot());
  if (history.past.length > history.MAX) history.past.shift();
  history.future = [];
  updateUndoBtn();
}

function restoreSnapshot(snap) {
  history._paused = true;
  history._restoring = true;
  const bg = state.backgroundImage;
  canvas.loadFromJSON(JSON.parse(snap.canvas), () => {
    if (bg) { canvas.add(bg); canvas.sendToBack(bg); }
    state.backgroundImage = bg;
    elements.length = 0;
    JSON.parse(snap.elements).forEach(e => elements.push(e));
    constraints.length = 0;
    JSON.parse(snap.constraints).forEach(c => constraints.push(c));
    elementId = snap.elementId;
    constraintId = snap.constraintId;
    canvas.renderAll();
    history._paused = false;
    history._restoring = false;
    updateUndoBtn();
    updateElementDrawer();
  });
}

function undo() {
  if (history._restoring || !history.past.length) return;
  history.future.push(getSnapshot());
  restoreSnapshot(history.past.pop());
}

function redo() {
  if (history._restoring || !history.future.length) return;
  history.past.push(getSnapshot());
  restoreSnapshot(history.future.pop());
}

function updateUndoBtn() {
  const u = document.getElementById('tt-undo');
  if (u) u.disabled = history._restoring || history.past.length === 0;
}

// =========================================================
// TOAST
// =========================================================
const TOAST_COLORS = {
  error: 'rgba(220,38,38,0.93)',
  warning: 'rgba(217,119,6,0.93)',
  success: 'rgba(22,163,74,0.93)',
  info: 'rgba(37,99,235,0.93)',
};

function showToast(msg, type = 'error') {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
      color:#fff;padding:9px 22px;border-radius:22px;
      font-size:13px;font-weight:600;z-index:2000;pointer-events:none;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      box-shadow:0 8px 24px rgba(0,0,0,0.18);transition:opacity 0.3s;
      font-family:inherit;`;
    document.body.appendChild(t);
  }
  t.style.background = TOAST_COLORS[type] || TOAST_COLORS.error;
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, type === 'error' ? 4500 : 3000);
}

function haptic(style = 'light') {
  if (!navigator.vibrate) return;
  switch (style) {
    case 'light': navigator.vibrate(10); break;
    case 'medium': navigator.vibrate(20); break;
  }
}

// =========================================================
// MODAL
// =========================================================
function createModal(title, bodyHTML, onConfirm, onCancel, okLabel = 'OK') {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>${title}</h2>
      ${bodyHTML}
      <div class="btn-row">
        <button id="modal-cancel">Abbrechen</button>
        <button id="modal-ok">${okLabel}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  let done = false;
  const close = () => { if (done) return; done = true; document.body.removeChild(overlay); };
  overlay.querySelector('#modal-ok').onclick = () => { if (!done) { onConfirm(); close(); } };
  overlay.querySelector('#modal-cancel').onclick = () => { if (!done) { if (onCancel) onCancel(); close(); } };
  overlay.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); if (!done) { onConfirm(); close(); } }
    if (e.key === 'Escape') { e.preventDefault(); if (!done) { if (onCancel) onCancel(); close(); } }
  });
  const firstInput = overlay.querySelector('input');
  if (firstInput) setTimeout(() => firstInput.focus(), 50);
  return overlay;
}

// =========================================================
// STATUS BAR
// =========================================================
const _statusBar = document.getElementById('status-bar');
function showStatus(msg) {
  _statusBar.textContent = msg;
  _statusBar.classList.add('visible');
}
function hideStatus() {
  _statusBar.classList.remove('visible');
}

// =========================================================
// IMAGE / PDF LOADING
// =========================================================
function loadImageFromDataUrl(dataUrl, fileName) {
  fabric.Image.fromURL(dataUrl, img => {
    const scaleX = (canvas.width * 0.95) / img.width;
    const scaleY = (canvas.height * 0.95) / img.height;
    const s = Math.min(scaleX, scaleY, 1);
    img.scale(s);
    state.imgDisplayScale = s;
    img.set({
      left: (canvas.width - img.width * s) / 2,
      top: (canvas.height - img.height * s) / 2,
      selectable: false, evented: false, hasBorders: false, hasControls: false,
      _noSelect: true, _isBackground: true,
    });
    state.backgroundImage = img;
    state.backgroundInfo = { name: fileName || 'image', width: img.width, height: img.height };
    canvas.clear();
    canvas.add(img);
    canvas.sendToBack(img);
    document.getElementById('drop-overlay').classList.add('hidden');
    elements.length = 0;
    constraints.length = 0;
    elementId = 0;
    constraintId = 0;
    history.past = []; history.future = [];
    updateUndoBtn();
    updateElementDrawer();
  });
}

async function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => loadImageFromDataUrl(e.target.result, file.name);
  reader.readAsDataURL(file);
}

async function loadPdf(file) {
  if (!window.pdfjsLib) { showToast('PDF.js nicht verfugbar.', 'error'); return; }
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const numPages = pdf.numPages;
    const renderPage = async pageNum => {
      const page = await pdf.getPage(pageNum);
      const viewport = page.getViewport({ scale: 3 });
      const c = document.createElement('canvas');
      c.width = viewport.width;
      c.height = viewport.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport }).promise;
      return c.toDataURL('image/png');
    };
    if (numPages === 1) {
      const dataUrl = await renderPage(1);
      loadImageFromDataUrl(dataUrl, file.name);
    } else {
      const bodyHTML = `
        <p>Die PDF hat <b>${numPages} Seiten</b>. Welche Seite soll geladen werden?</p>
        <input id="_pdf-page" type="number" min="1" max="${numPages}" value="1" />`;
      createModal('PDF-Seite', bodyHTML, async () => {
        const n = Math.min(numPages, Math.max(1, parseInt(document.getElementById('_pdf-page').value) || 1));
        const dataUrl = await renderPage(n);
        loadImageFromDataUrl(dataUrl, file.name);
      });
    }
  } catch (err) {
    showToast('PDF konnte nicht geladen werden.', 'error');
  }
}

function loadFileAuto(file) {
  if (!file) return;
  if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
    loadPdf(file);
  } else {
    loadImage(file);
  }
}

document.getElementById('file-input').onchange = e => { loadFileAuto(e.target.files[0]); };

wrapper.addEventListener('dragover', e => { e.preventDefault(); wrapper.style.outline = '3px dashed #4ecca3'; });
wrapper.addEventListener('dragleave', () => { wrapper.style.outline = ''; });
wrapper.addEventListener('drop', e => {
  e.preventDefault();
  wrapper.style.outline = '';
  const file = e.dataTransfer.files[0];
  if (file && (file.type.startsWith('image/') || file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) loadFileAuto(file);
});

// =========================================================
// ZOOM / PAN
// =========================================================
let _zoomHudTimer;
function showZoomHUD(z) {
  const hud = document.getElementById('zoom-hud');
  hud.textContent = Math.round(z * 100) + '%';
  hud.classList.remove('fading');
  hud.classList.add('visible');
  clearTimeout(_zoomHudTimer);
  _zoomHudTimer = setTimeout(() => {
    hud.classList.add('fading');
    setTimeout(() => hud.classList.remove('visible', 'fading'), 650);
  }, 900);
}

function setZoom(z, point) {
  z = Math.min(Math.max(z, 0.05), 20);
  if (point && isFinite(point.x) && isFinite(point.y)) canvas.zoomToPoint(point, z);
  else canvas.setZoom(z);
  state.zoom = z;
  showZoomHUD(z);
}

// Mouse wheel zoom (desktop)
wrapper.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = wrapper.getBoundingClientRect();
  setZoom(canvas.getZoom() * delta, { x: e.clientX - rect.left, y: e.clientY - rect.top });
}, { passive: false });

// Space-bar pan (desktop)
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat && !e.target.matches('input,textarea,select')) {
    e.preventDefault();
    state.spacePan = true;
    canvas.defaultCursor = 'grab';
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    state.spacePan = false;
    canvas.defaultCursor = state.tool === 'select' ? 'default' : 'crosshair';
    if (state.panning) { state.panning = false; }
  }
});
document.addEventListener('mousemove', e => {
  if (!state.panning) return;
  const dx = e.clientX - state.lastPan.x;
  const dy = e.clientY - state.lastPan.y;
  state.lastPan = { x: e.clientX, y: e.clientY };
  const vpt = canvas.viewportTransform.slice();
  vpt[4] += dx; vpt[5] += dy;
  canvas.setViewportTransform(vpt);
});
document.addEventListener('mouseup', () => {
  if (state.panning) { state.panning = false; canvas.defaultCursor = state.tool === 'select' ? 'default' : 'crosshair'; }
});

// Ctrl+Z / Ctrl+Y
document.addEventListener('keydown', e => {
  if (e.target.matches('input,textarea,select')) return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
});

// =========================================================
// TOOL MANAGEMENT
// =========================================================
function setTool(t) {
  _tryMobileOnboarding(t);
  state.tool = t;
  clearTempDrawing();
  state.measureStep = 0;
  state.measureFromId = null;
  state.measureFromAnchor = null;
  clearMeasureHighlights();
  clearSelection();

  canvas.defaultCursor = t === 'select' ? 'default' : 'crosshair';
  canvas.forEachObject(o => {
    if (o._isBackground || o._noSelect) return;
    o.selectable = (t === 'select');
    o.evented = (t === 'select');
  });

  // Update toolbar active state
  document.querySelectorAll('#touch-toolbar button').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('tt-' + t);
  if (activeBtn) activeBtn.classList.add('active');

  hideStatus();
  if (LINE_TOOLS.includes(t)) showStatus('Tippe Punkte fur eine Linie');
  if (POINT_TOOLS.includes(t)) showStatus('Tippe, um einen Punkt zu setzen');
  if (t === 'measure') showStatus('Tippe auf Element');
}

function clearTempDrawing() {
  canvas.getObjects().filter(o => o._tempDraw).forEach(o => canvas.remove(o));
  state.linePoints = [];
  state.drawingLine = null;
  _finishBtn.classList.remove('visible');
  canvas.renderAll();
}

function clearSelection() {
  canvas.discardActiveObject();
  if (state.selectedElementId != null) {
    canvas.getObjects().filter(o => o._elementId === state.selectedElementId).forEach(o => {
      o.set({ shadow: null });
    });
    state.selectedElementId = null;
    canvas.renderAll();
  }
}

function clearMeasureHighlights() {
  canvas.getObjects().filter(o => o._highlightGlow).forEach(o => canvas.remove(o));
  canvas.renderAll();
}

// =========================================================
// ONBOARDING
// =========================================================
const _OB_TOOLS = ['element-line', 'element-point', 'ref-line', 'ref-point'];
function _tryMobileOnboarding(t) {
  if (!_OB_TOOLS.includes(t)) return;
  if (!_isTouchDevice || localStorage.getItem('fa_mobile_ob_seen')) return;
  const el = document.getElementById('mobile-onboarding');
  if (el) el.classList.add('visible');
}
document.getElementById('mobile-ob-dismiss').onclick = () => {
  localStorage.setItem('fa_mobile_ob_seen', '1');
  document.getElementById('mobile-onboarding').classList.remove('visible');
};

// =========================================================
// SNAP TO PIXEL
// =========================================================
function snapToPixel(p) {
  const img = state.backgroundImage;
  if (!img) return p;
  const s = state.imgDisplayScale;
  const origX = Math.round((p.x - img.left) / s);
  const origY = Math.round((p.y - img.top) / s);
  return { x: img.left + origX * s, y: img.top + origY * s };
}

// =========================================================
// RENDER HELPERS
// =========================================================
let _rafPending = false;
function throttledRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; canvas.renderAll(); });
}

// =========================================================
// GEOMETRY HELPERS
// =========================================================
function distToSegment(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const lenSq = dx * dx + dy * dy;
  if (lenSq < 1e-9) return Math.hypot(p.x - a.x, p.y - a.y);
  let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
}

function closestPointOnSegment(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const lenSq = dx * dx + dy * dy;
  if (lenSq < 1e-9) return { x: a.x, y: a.y };
  let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return { x: a.x + t * dx, y: a.y + t * dy };
}

function closestPointOnPolyline(pts, p) {
  let minD = Infinity, nearest = { x: pts[0].x, y: pts[0].y };
  for (let i = 0; i < pts.length - 1; i++) {
    const cp = closestPointOnSegment(p, pts[i], pts[i + 1]);
    const d = Math.hypot(p.x - cp.x, p.y - cp.y);
    if (d < minD) { minD = d; nearest = cp; }
  }
  return nearest;
}

// =========================================================
// RENDER ELEMENT (universal)
// =========================================================
function renderElement(el) {
  const color = categoryColor(el.category);
  const isDashed = el.category === 'reference';

  if (el.type === 'point') {
    if (el.category === 'reference') {
      // Diamond marker for reference points
      const sz = 7;
      const pts = [
        { x: el.position.x, y: el.position.y - sz },
        { x: el.position.x + sz, y: el.position.y },
        { x: el.position.x, y: el.position.y + sz },
        { x: el.position.x - sz, y: el.position.y },
      ];
      const diamond = new fabric.Polygon(pts, {
        fill: color, stroke: '#fff', strokeWidth: 1.5,
        selectable: false, evented: false,
        _elementId: el.id, _elementType: 'point', _elementCategory: el.category, _noSelect: true,
      });
      canvas.add(diamond);
    } else {
      // Circle marker for element points
      const marker = new fabric.Circle({
        left: el.position.x, top: el.position.y,
        radius: MARKER_RADIUS,
        fill: color, stroke: '#fff', strokeWidth: 2,
        originX: 'center', originY: 'center',
        selectable: false, evented: false,
        _elementId: el.id, _elementType: 'point', _elementCategory: el.category, _noSelect: true,
      });
      canvas.add(marker);
    }

    const text = new fabric.Text(el.label, {
      left: el.position.x + MARKER_RADIUS + 5,
      top: el.position.y - LABEL_FONT_SIZE / 2,
      fontSize: LABEL_FONT_SIZE,
      fontFamily: 'DM Sans, sans-serif',
      fontWeight: '600',
      fill: '#2d2d2d',
      backgroundColor: 'rgba(255,255,255,0.85)',
      padding: 2,
      selectable: false, evented: false,
      _elementId: el.id, _elementType: 'point', _elementCategory: el.category, _noSelect: true,
    });
    canvas.add(text);

  } else if (el.type === 'line') {
    const polyOpts = {
      stroke: color,
      strokeWidth: isDashed ? 2 : LINE_WIDTH,
      fill: 'transparent',
      selectable: false, evented: false,
      _elementId: el.id, _elementType: 'line', _elementCategory: el.category, _noSelect: true,
    };
    if (isDashed) polyOpts.strokeDashArray = [8, 4];

    const polyline = new fabric.Polyline(el.points, polyOpts);
    canvas.add(polyline);

    // Endpoint/knickpoint dots
    el.points.forEach((p, i) => {
      const dot = new fabric.Circle({
        left: p.x, top: p.y, radius: 3,
        fill: color, stroke: '#fff', strokeWidth: 1,
        originX: 'center', originY: 'center',
        selectable: false, evented: false,
        _elementId: el.id, _elementType: 'line', _elementCategory: el.category,
        _knickIndex: i, _noSelect: true,
      });
      canvas.add(dot);
    });

    // Label at midpoint
    const midIdx = Math.floor(el.points.length / 2);
    const mid = el.points[midIdx];
    const text = new fabric.Text(el.label, {
      left: mid.x + 6, top: mid.y - LABEL_FONT_SIZE / 2,
      fontSize: LABEL_FONT_SIZE,
      fontFamily: 'DM Sans, sans-serif',
      fontWeight: '600',
      fill: '#2d2d2d',
      backgroundColor: 'rgba(255,255,255,0.85)',
      padding: 2,
      selectable: false, evented: false,
      _elementId: el.id, _elementType: 'line', _elementCategory: el.category, _noSelect: true,
    });
    canvas.add(text);
  }

  canvas.renderAll();
}

// =========================================================
// PLACE POINT
// =========================================================
function placePoint(pos, category) {
  const id = ++elementId;
  const catLabel = category === 'reference' ? 'Referenzpunkt' : 'Element-Punkt';
  const ph = category === 'reference' ? 'z.B. Grenzstein, Wandecke' : 'z.B. Schacht, Hydrant';
  const bodyHTML = `<input id="_el-label" type="text" placeholder="${ph}" value="" />`;
  createModal(catLabel + ' benennen', bodyHTML, () => {
    const label = document.getElementById('_el-label').value.trim() || (category === 'reference' ? 'R' : 'P') + id;
    const el = { id, type: 'point', category, label, position: { x: pos.x, y: pos.y } };
    elements.push(el);
    renderElement(el);
    saveSnapshot();
    updateElementDrawer();
  }, () => { elementId--; });
}

// =========================================================
// LINE TOOL
// =========================================================
function handleLineClick(pos, category) {
  state.linePoints.push(pos);

  if (state.drawingLine) { canvas.remove(state.drawingLine); state.drawingLine = null; }

  const color = categoryColor(category);
  const isDashed = category === 'reference';

  if (state.linePoints.length >= 2) {
    const opts = {
      stroke: color, strokeWidth: isDashed ? 2 : LINE_WIDTH, fill: 'transparent',
      selectable: false, evented: false, _tempDraw: true,
    };
    if (isDashed) opts.strokeDashArray = [8, 4];
    state.drawingLine = new fabric.Polyline(state.linePoints.map(p => ({ x: p.x, y: p.y })), opts);
    canvas.add(state.drawingLine);
    _finishBtn.classList.add('visible');
  }

  const dot = new fabric.Circle({
    left: pos.x, top: pos.y, radius: 3,
    fill: color, originX: 'center', originY: 'center',
    selectable: false, evented: false, _tempDraw: true,
  });
  canvas.add(dot);
  canvas.renderAll();
}

function finishLine(category) {
  if (state.linePoints.length < 2) return;
  const points = state.linePoints.map(p => ({ x: p.x, y: p.y }));
  clearTempDrawing();

  const id = ++elementId;
  const catLabel = category === 'reference' ? 'Referenz-Linie' : 'Element-Linie';
  const ph = category === 'reference' ? 'z.B. Bordstein, Gebaudekante, Grenze' : 'z.B. TW, EL, GAS';
  const bodyHTML = `<input id="_el-label" type="text" placeholder="${ph}" value="" />`;
  createModal(catLabel + ' benennen', bodyHTML, () => {
    const label = document.getElementById('_el-label').value.trim() || (category === 'reference' ? 'REF' : 'EL') + id;
    const el = { id, type: 'line', category, label, points };
    elements.push(el);
    renderElement(el);
    saveSnapshot();
    updateElementDrawer();
  }, () => { elementId--; });
}

// =========================================================
// HIT DETECTION — findElementAnchor
// =========================================================
// Returns { element, anchor } or null
// anchor = { type:'segment', index } | { type:'knick', index }
function findElementAnchor(pos, categoryFilter) {
  const z = canvas.getZoom();
  const threshold = 30 / z;
  const knickThreshold = threshold * 0.6; // knickpoints have priority with tighter threshold

  let bestEl = null, bestAnchor = null, bestDist = Infinity;

  elements.forEach(el => {
    if (categoryFilter && el.category !== categoryFilter) return;

    if (el.type === 'point') {
      const d = Math.hypot(pos.x - el.position.x, pos.y - el.position.y);
      if (d < threshold && d < bestDist) {
        bestEl = el;
        bestAnchor = { type: 'knick', index: 0 };
        bestDist = d;
      }
    } else if (el.type === 'line') {
      const pts = el.points;
      // Check knickpoints first (higher priority)
      for (let i = 0; i < pts.length; i++) {
        const d = Math.hypot(pos.x - pts[i].x, pos.y - pts[i].y);
        if (d < knickThreshold && d < bestDist) {
          bestEl = el;
          bestAnchor = { type: 'knick', index: i };
          bestDist = d;
        }
      }
      // Then check segments
      for (let i = 0; i < pts.length - 1; i++) {
        const d = distToSegment(pos, pts[i], pts[i + 1]);
        if (d < threshold && d < bestDist) {
          bestEl = el;
          bestAnchor = { type: 'segment', index: i };
          bestDist = d;
        }
      }
    }
  });

  if (!bestEl) return null;
  return { element: bestEl, anchor: bestAnchor };
}

// =========================================================
// MEASURE WORKFLOW
// =========================================================
function getAnchorPosition(el, anchor, fromPos) {
  if (!el || !anchor) return null;
  if (el.type === 'point') return { x: el.position.x, y: el.position.y };

  const pts = el.points;
  if (anchor.type === 'knick') {
    return { x: pts[anchor.index].x, y: pts[anchor.index].y };
  }
  if (anchor.type === 'segment') {
    const a = pts[anchor.index], b = pts[anchor.index + 1];
    if (fromPos) return closestPointOnSegment(fromPos, a, b);
    return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  }
  if (anchor.type === 'line') {
    if (fromPos) return closestPointOnPolyline(pts, fromPos);
    return { x: pts[0].x, y: pts[0].y };
  }
  return null;
}

function handleMeasureClick(pos) {
  if (state.measureStep === 0) {
    // Select element anchor
    const hit = findElementAnchor(pos, 'element');
    if (!hit) {
      showToast('Kein Element in der Nahe', 'warning');
      return;
    }
    state.measureFromId = hit.element.id;
    state.measureFromAnchor = hit.anchor;
    state.measureStep = 1;
    highlightElementWithAnchor(hit.element, hit.anchor);
    showStatus('Tippe auf Referenz');
    haptic('light');

  } else if (state.measureStep === 1) {
    // Select reference anchor
    const hit = findElementAnchor(pos, 'reference');
    if (!hit) {
      showToast('Keine Referenz in der Nahe', 'warning');
      return;
    }

    const fromEl = elements.find(e => e.id === state.measureFromId);
    const fromAnchor = state.measureFromAnchor;
    const refEl = hit.element;

    highlightElementWithAnchor(refEl, hit.anchor);
    haptic('medium');

    // Determine reference anchor
    let refAnchor;
    if (refEl.type === 'point') {
      refAnchor = { type: 'point' };
    } else {
      refAnchor = { type: 'line' };
    }

    // Perpendicular is possible when: (segment→line) or (knick→line)
    const canPerp = (fromAnchor.type === 'segment' || fromAnchor.type === 'knick') && refEl.type === 'line';

    let perpHTML = '';
    if (canPerp) {
      perpHTML = `<div class="perp-row">
        <input type="checkbox" id="_meas-perp" style="width:auto;margin-bottom:0;" />
        <label for="_meas-perp">Lotrecht (rechtwinklig)</label>
      </div>`;
    }

    const bodyHTML = `
      <p style="margin-bottom:8px;">${fromEl.label} &rarr; ${refEl.label}</p>
      <input id="_meas-value" type="text" inputmode="decimal" placeholder="Abstand in Metern (z.B. 3,40)" />
      ${perpHTML}`;

    createModal('Abstand eingeben', bodyHTML, () => {
      const rawVal = document.getElementById('_meas-value').value.replace(',', '.');
      const value_m = parseFloat(rawVal);
      if (!value_m || value_m <= 0) {
        showToast('Bitte einen gultigen Wert eingeben', 'error');
        resetMeasure();
        return;
      }
      const isPerp = canPerp && document.getElementById('_meas-perp')?.checked;
      const c = {
        id: ++constraintId,
        elementId: fromEl.id,
        refId: refEl.id,
        value_m,
        type: isPerp ? 'perpendicular' : 'point-to-point',
        elementAnchor: fromAnchor,
        refAnchor,
      };
      constraints.push(c);
      renderConstraint(c);
      saveSnapshot();
      updateElementDrawer();
      resetMeasure();
      showToast(value_m.toFixed(2).replace('.', ',') + ' m erfasst', 'success');
    }, () => {
      resetMeasure();
    }, 'Speichern');

    setTimeout(() => {
      const inp = document.getElementById('_meas-value');
      if (inp) inp.focus();
    }, 100);
  }
}

function resetMeasure() {
  clearMeasureHighlights();
  state.measureStep = 0;
  state.measureFromId = null;
  state.measureFromAnchor = null;
  showStatus('Tippe auf Element');
  canvas.renderAll();
}

function highlightElementWithAnchor(el, anchor) {
  const color = '#2196F3';
  if (el.type === 'point') {
    const glow = new fabric.Circle({
      left: el.position.x, top: el.position.y,
      radius: MARKER_RADIUS + 6,
      fill: 'transparent', stroke: color, strokeWidth: 3,
      originX: 'center', originY: 'center',
      selectable: false, evented: false, _highlightGlow: true,
    });
    canvas.add(glow);
  } else {
    const pts = el.points;
    const glow = new fabric.Polyline(pts.map(p => ({ x: p.x, y: p.y })), {
      stroke: color, strokeWidth: LINE_WIDTH + 3,
      fill: 'transparent',
      selectable: false, evented: false, _highlightGlow: true,
    });
    canvas.add(glow);
    canvas.sendToBack(glow);
    if (state.backgroundImage) canvas.sendToBack(state.backgroundImage);

    // Highlight specific knick if applicable
    if (anchor && anchor.type === 'knick') {
      const kp = pts[anchor.index];
      const knickGlow = new fabric.Circle({
        left: kp.x, top: kp.y, radius: 8,
        fill: 'transparent', stroke: color, strokeWidth: 2.5,
        originX: 'center', originY: 'center',
        selectable: false, evented: false, _highlightGlow: true,
      });
      canvas.add(knickGlow);
    }
  }
  canvas.renderAll();
}

// =========================================================
// RENDER CONSTRAINT
// =========================================================
function renderConstraint(c) {
  const fromEl = elements.find(e => e.id === c.elementId);
  const refEl = elements.find(e => e.id === c.refId);
  if (!fromEl || !refEl) return;

  // Resolve anchor positions
  let p1 = getAnchorPosition(fromEl, c.elementAnchor, null);
  let p2;

  if (c.type === 'perpendicular' && refEl.type === 'line') {
    // foot of perpendicular from p1 onto reference line
    p2 = closestPointOnPolyline(refEl.points, p1);
  } else {
    // point-to-point: nearest points between anchors
    if (refEl.type === 'point') {
      p2 = { x: refEl.position.x, y: refEl.position.y };
    } else {
      p2 = closestPointOnPolyline(refEl.points, p1);
    }
  }

  if (!p1 || !p2) return;

  // Dashed constraint line
  const line = new fabric.Line([p1.x, p1.y, p2.x, p2.y], {
    stroke: CONSTRAINT_COLOR,
    strokeWidth: 1.5,
    strokeDashArray: [6, 4],
    selectable: false, evented: false,
    _constraintId: c.id, _noSelect: true,
  });
  canvas.add(line);

  // Value label
  const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
  const valueText = c.value_m.toFixed(2).replace('.', ',') + ' m';
  const text = new fabric.Text(valueText, {
    left: mx, top: my - 8,
    originX: 'center',
    fontSize: 11,
    fontFamily: 'DM Sans, sans-serif',
    fontWeight: '700',
    fill: '#fff',
    backgroundColor: 'rgba(60,60,60,0.82)',
    padding: 3,
    selectable: false, evented: false,
    _constraintId: c.id, _noSelect: true,
  });
  canvas.add(text);

  // Right-angle marker for perpendicular
  if (c.type === 'perpendicular') {
    const sz = 8;
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.hypot(dx, dy);
    if (len > 1) {
      const nx = dx / len, ny = dy / len;
      const px = -ny, py = nx;
      const corner = [
        { x: p2.x - nx * sz, y: p2.y - ny * sz },
        { x: p2.x - nx * sz + px * sz, y: p2.y - ny * sz + py * sz },
        { x: p2.x + px * sz, y: p2.y + py * sz },
      ];
      const mark = new fabric.Polyline(corner, {
        stroke: CONSTRAINT_COLOR, strokeWidth: 1, fill: 'transparent',
        selectable: false, evented: false,
        _constraintId: c.id, _noSelect: true,
      });
      canvas.add(mark);
    }
  }

  canvas.renderAll();
}

// =========================================================
// CANVAS EVENTS (Desktop)
// =========================================================
canvas.on('mouse:down', opt => {
  if (_isTouchDevice) return;
  if (!state.backgroundImage) return;

  const e = opt.e;
  if (state.spacePan || e.button === 1) {
    state.panning = true;
    state.lastPan = { x: e.clientX, y: e.clientY };
    canvas.defaultCursor = 'grabbing';
    return;
  }
  if (e.button !== 0) return;

  const p = canvas.getPointer(e);
  const snapped = snapToPixel(p);

  // Determine current category from tool
  const cat = state.tool.startsWith('ref-') ? 'reference' : 'element';

  switch (state.tool) {
    case 'element-point': placePoint(snapped, 'element'); break;
    case 'ref-point': placePoint(snapped, 'reference'); break;
    case 'element-line': handleLineClick(snapped, 'element'); break;
    case 'ref-line': handleLineClick(snapped, 'reference'); break;
    case 'measure': handleMeasureClick(snapped); break;
    case 'select': handleSelectClick(snapped, opt); break;
  }
});

// =========================================================
// SELECT TOOL
// =========================================================
function handleSelectClick(pos, opt) {
  const hit = findElementAnchor(pos, null);
  clearSelection();
  if (!hit) return;
  const el = hit.element;
  state.selectedElementId = el.id;
  canvas.getObjects().filter(o => o._elementId === el.id).forEach(o => {
    o.set({ shadow: new fabric.Shadow({ color: '#2196F3', blur: 10 }) });
  });
  canvas.renderAll();
}

// Double-click to edit label
canvas.on('mouse:dblclick', opt => {
  if (state.tool !== 'select') return;
  const p = canvas.getPointer(opt.e);
  const hit = findElementAnchor(p, null);
  if (hit) editElementLabel(hit.element);
});

function editElementLabel(el) {
  const bodyHTML = `<input id="_el-label" type="text" value="${el.label}" />`;
  createModal('Label bearbeiten', bodyHTML, () => {
    const newLabel = document.getElementById('_el-label').value.trim();
    if (newLabel && newLabel !== el.label) {
      el.label = newLabel;
      canvas.getObjects().filter(o => o._elementId === el.id).forEach(o => canvas.remove(o));
      renderElement(el);
      saveSnapshot();
      updateElementDrawer();
    }
  });
}

// =========================================================
// DELETE ELEMENT
// =========================================================
function deleteElement(elId) {
  canvas.getObjects().filter(o => o._elementId === elId).forEach(o => canvas.remove(o));
  // Remove constraints involving this element
  const relatedConstraints = constraints.filter(c => c.elementId === elId || c.refId === elId);
  relatedConstraints.forEach(c => {
    canvas.getObjects().filter(o => o._constraintId === c.id).forEach(o => canvas.remove(o));
  });
  const idx = elements.findIndex(e => e.id === elId);
  if (idx >= 0) elements.splice(idx, 1);
  for (let i = constraints.length - 1; i >= 0; i--) {
    if (constraints[i].elementId === elId || constraints[i].refId === elId) constraints.splice(i, 1);
  }
  canvas.renderAll();
  saveSnapshot();
  updateElementDrawer();
}

// =========================================================
// DELETE CONSTRAINT
// =========================================================
function deleteConstraint(cId) {
  canvas.getObjects().filter(o => o._constraintId === cId).forEach(o => canvas.remove(o));
  const idx = constraints.findIndex(c => c.id === cId);
  if (idx >= 0) constraints.splice(idx, 1);
  canvas.renderAll();
  saveSnapshot();
  updateElementDrawer();
}

// =========================================================
// ELEMENT DRAWER
// =========================================================
function updateElementDrawer() {
  const drawer = document.getElementById('element-drawer');
  const elems = elements;
  const cons = constraints;

  if (elems.length === 0 && cons.length === 0) {
    drawer.classList.remove('visible');
    return;
  }

  const elemElems = elems.filter(e => e.category === 'element');
  const refElems  = elems.filter(e => e.category === 'reference');

  const typeIcon = (el) => {
    if (el.type === 'point') return el.category === 'reference' ? '\u25C6' : '\u25CF';
    return el.category === 'reference' ? '\u2500\u2500' : '\u2501\u2501';
  };
  const typeLabel = (el) => {
    const t = el.type === 'point' ? 'Punkt' : 'Linie';
    return el.category === 'reference' ? 'Referenz-' + t : 'Element-' + t;
  };

  let html = '<div class="drawer-title"><span>Erfasste Daten</span><button onclick="document.getElementById(\'element-drawer\').classList.remove(\'visible\')" style="font-size:18px;padding:2px 8px;">&times;</button></div>';

  if (elemElems.length > 0) {
    html += '<div class="drawer-section-title">Elemente (' + elemElems.length + ')</div>';
    elemElems.forEach(el => {
      html += `<div class="el-item">
        <div class="el-icon cat-element">${typeIcon(el)}</div>
        <div>
          <div class="el-label">${el.label}</div>
          <div class="el-type">${typeLabel(el)}</div>
        </div>
        <button class="el-delete" onclick="deleteElement(${el.id})">&#10005;</button>
      </div>`;
    });
  }

  if (refElems.length > 0) {
    html += '<div class="drawer-section-title">Referenzen (' + refElems.length + ')</div>';
    refElems.forEach(el => {
      html += `<div class="el-item">
        <div class="el-icon cat-reference">${typeIcon(el)}</div>
        <div>
          <div class="el-label">${el.label}</div>
          <div class="el-type">${typeLabel(el)}</div>
        </div>
        <button class="el-delete" onclick="deleteElement(${el.id})">&#10005;</button>
      </div>`;
    });
  }

  if (cons.length > 0) {
    html += '<div class="drawer-section-title">Messungen (' + cons.length + ')</div>';
    cons.forEach(c => {
      const fromEl = elements.find(e => e.id === c.elementId);
      const refEl = elements.find(e => e.id === c.refId);
      const fromLabel = fromEl ? fromEl.label : '?';
      const refLabel = refEl ? refEl.label : '?';
      const typeStr = c.type === 'perpendicular' ? ' (lotrecht)' : '';
      html += `<div class="meas-item">
        <span>${fromLabel} &rarr; ${refLabel}${typeStr}</span>
        <span class="meas-value">${c.value_m.toFixed(2).replace('.', ',')} m</span>
        <button class="el-delete" onclick="deleteConstraint(${c.id})">&#10005;</button>
      </div>`;
    });
  }

  drawer.innerHTML = html;
}

// =========================================================
// EXPORT — v2 format for Planer
// =========================================================
function doExport() {
  if (elements.length === 0) {
    showToast('Keine Elemente zum Exportieren', 'warning');
    return;
  }
  const img = state.backgroundImage;
  const s = state.imgDisplayScale;
  const offX = img ? img.left : 0;
  const offY = img ? img.top : 0;

  const normPos = p => ({ x: (p.x - offX) / s, y: (p.y - offY) / s });

  const data = {
    version: 2,
    type: 'feldaufnahme',
    exportDate: new Date().toISOString(),
    backgroundInfo: state.backgroundInfo,
    elements: elements.map(el => {
      const base = { id: el.id, type: el.type, category: el.category, label: el.label };
      if (el.type === 'point') base.position = normPos(el.position);
      else base.points = el.points.map(normPos);
      return base;
    }),
    constraints: constraints.map(c => ({
      id: c.id,
      elementId: c.elementId,
      refId: c.refId,
      value_m: c.value_m,
      type: c.type,
      elementAnchor: c.elementAnchor,
      refAnchor: c.refAnchor,
    })),
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const fileName = 'feldaufnahme-' + new Date().toISOString().slice(0, 10) + '.json';
  const file = new File([blob], fileName, { type: 'application/json' });

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: 'Feldaufnahme' }).catch(() => {});
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }

  showToast(elements.length + ' Element(e) exportiert', 'success');
}

// =========================================================
// SAVE / LOAD PROJECT
// =========================================================
function saveProject() {
  const json = canvas.toJSON(CANVAS_SERIAL_PROPS);
  json.objects = (json.objects || []).filter(o => !o._isBackground);

  const data = {
    version: 2,
    type: 'feldaufnahme-project',
    saveDate: new Date().toISOString(),
    backgroundInfo: state.backgroundInfo,
    imgDisplayScale: state.imgDisplayScale,
    bgLeft: state.backgroundImage ? state.backgroundImage.left : 0,
    bgTop: state.backgroundImage ? state.backgroundImage.top : 0,
    canvas: json,
    elements: elements,
    constraints: constraints,
    elementId: elementId,
    constraintId: constraintId,
  };

  if (state.backgroundImage) {
    try { data.backgroundDataUrl = state.backgroundImage.toDataURL(); } catch (e) { /* cross-origin */ }
  }

  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const file = new File([blob], 'feldaufnahme-projekt.json', { type: 'application/json' });

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: 'Feldaufnahme Projekt' }).catch(() => {});
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = file.name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }
  showToast('Projekt gespeichert', 'success');
}

function loadProject(data) {
  if (!data || data.type !== 'feldaufnahme-project') {
    showToast('Keine gultige Projektdatei', 'error');
    return;
  }

  const restore = () => {
    history._paused = true;
    canvas.loadFromJSON(data.canvas, () => {
      if (state.backgroundImage) { canvas.add(state.backgroundImage); canvas.sendToBack(state.backgroundImage); }
      elements.length = 0;
      (data.elements || []).forEach(e => elements.push(e));
      constraints.length = 0;
      (data.constraints || []).forEach(c => constraints.push(c));
      elementId = data.elementId || 0;
      constraintId = data.constraintId || 0;
      state.backgroundInfo = data.backgroundInfo;
      state.imgDisplayScale = data.imgDisplayScale || 1;
      document.getElementById('drop-overlay').classList.add('hidden');
      canvas.renderAll();
      history._paused = false;
      history.past = []; history.future = [];
      updateUndoBtn();
      updateElementDrawer();
      showToast('Projekt geladen', 'success');
    });
  };

  if (data.backgroundDataUrl) {
    fabric.Image.fromURL(data.backgroundDataUrl, img => {
      const s = data.imgDisplayScale || 1;
      img.scale(s);
      img.set({
        left: data.bgLeft || (canvas.width - img.width * s) / 2,
        top: data.bgTop || (canvas.height - img.height * s) / 2,
        selectable: false, evented: false, hasBorders: false, hasControls: false,
        _noSelect: true, _isBackground: true,
      });
      state.backgroundImage = img;
      restore();
    });
  } else {
    state.backgroundImage = null;
    restore();
  }
}

document.getElementById('btn-save').onclick = saveProject;
document.getElementById('btn-export').onclick = doExport;
document.getElementById('btn-load-project').onclick = () => document.getElementById('project-input').click();
document.getElementById('project-input').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      loadProject(data);
    } catch (err) {
      showToast('Datei konnte nicht geladen werden', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

// =========================================================
// MOBILE: Canvas resize
// =========================================================
if (_isTouchDevice) {
  requestAnimationFrame(() => {
    canvas.setWidth(wrapper.clientWidth);
    canvas.setHeight(wrapper.clientHeight);
    canvas.renderAll();
  });
}

// =========================================================
// MOBILE: BOTTOM TOOLBAR
// =========================================================
if (_isTouchDevice) {
  const _ttToolMap = {
    'tt-select': 'select',
    'tt-element-line': 'element-line',
    'tt-element-point': 'element-point',
    'tt-ref-line': 'ref-line',

// =========================================================
// MOBILE: THREE-DOT MENU
// =========================================================

    constraints.length = 0;

// =========================================================
// MOBILE: FINISH BUTTON
// =========================================================
const _finishBtn = document.getElementById('mobile-finish-btn');

function _updateFinishBtn() {
  if (!_isTouchDevice) return;
  const showFinish = LINE_TOOLS.includes(state.tool) && state.linePoints.length >= 2;
  if (showFinish) _finishBtn.classList.add('visible');
  else _finishBtn.classList.remove('visible');
}

if (_isTouchDevice) {
  _finishBtn.addEventListener('click', () => {
    if (LINE_TOOLS.includes(state.tool) && state.linePoints.length >= 2) {
      const cat = state.tool === 'ref-line' ? 'reference' : 'element';
      finishLine(cat);
    }
    _finishBtn.classList.remove('visible');
    _mobileMag.hide();
    _hideMobileCrosshair();
  });
}

// =========================================================
// MOBILE MAGNIFIER
// =========================================================
const _mobileMag = (() => {
  if (!_isTouchDevice) return { show() {}, hide() {}, updateStart() {}, updateEnd() {}, hideStart() {}, hideEnd() {}, active: false };

  const SIZE = 130, ZOOM = 4;
  const dpr = () => window.devicePixelRatio || 1;

  function createMagCanvas(container) {
    const c = document.createElement('canvas');
    container.insertBefore(c, container.firstChild);
    const d = dpr();
    c.width = SIZE * d; c.height = SIZE * d;
    c.style.width = SIZE + 'px'; c.style.height = SIZE + 'px';
    return { canvas: c, ctx: c.getContext('2d') };
  }

  const startEl = document.getElementById('mobile-mag-start');
  const endEl = document.getElementById('mobile-mag-end');
  const startMag = createMagCanvas(startEl);
  const endMag = createMagCanvas(endEl);

  function renderMag(mag, canvasX, canvasY, color) {
    const d = dpr();
    const ctx = mag.ctx;
    const c = mag.canvas;
    if (c.width !== SIZE * d) {
      c.width = SIZE * d; c.height = SIZE * d;
      c.style.width = SIZE + 'px'; c.style.height = SIZE + 'px';
    }
    const vpt = canvas.viewportTransform;
    const screenX = canvasX * vpt[0] + vpt[4];
    const screenY = canvasY * vpt[3] + vpt[5];
    const cpx = screenX * d, cpy = screenY * d;
    const srcW = (SIZE / ZOOM) * d, srcH = (SIZE / ZOOM) * d;
    const srcX = cpx - srcW / 2, srcY = cpy - srcH / 2;
    ctx.clearRect(0, 0, SIZE * d, SIZE * d);
    try { ctx.drawImage(canvas.lowerCanvasEl, srcX, srcY, srcW, srcH, 0, 0, SIZE * d, SIZE * d); } catch(_) {}
    ctx.save();
    ctx.scale(d, d);
    const h = SIZE / 2, GAP = 6;
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    ctx.beginPath(); ctx.arc(h, h, GAP + 1, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = color || 'rgba(210,30,30,0.92)';
    ctx.lineWidth = 1.2;
    ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(0, h); ctx.lineTo(h - GAP, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(h + GAP, h); ctx.lineTo(SIZE, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(h, 0); ctx.lineTo(h, h - GAP); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(h, h + GAP); ctx.lineTo(h, SIZE); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = color || 'rgba(210,30,30,1)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(h, h, 2.5, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  let _active = false;
  return {
    get active() { return _active; },
    updateStart(x, y, c) { startEl.classList.add('visible'); _active = true; renderMag(startMag, x, y, c); },
    updateEnd(x, y, c) { endEl.classList.add('visible'); _active = true; renderMag(endMag, x, y, c); },
    hideStart() { startEl.classList.remove('visible'); },
    hideEnd() { endEl.classList.remove('visible'); },
    show() { _active = true; },
    hide() { _active = false; startEl.classList.remove('visible'); endEl.classList.remove('visible'); },
  };
})();

// =========================================================
// MOBILE CROSSHAIR
// =========================================================
const _crosshairEl = document.getElementById('mobile-crosshair');
function _showMobileCrosshair(clientX, clientY) {
  _crosshairEl.style.left = clientX + 'px';
  _crosshairEl.style.top = clientY + 'px';
  _crosshairEl.classList.add('visible');
}
function _hideMobileCrosshair() {
  _crosshairEl.classList.remove('visible');
}

// =========================================================
// MOBILE: UPDATE MAGNIFIERS
// =========================================================
function _updateMobileMagnifiers(p) {
  const isLineTool = LINE_TOOLS.includes(state.tool);
  const col = state.tool.startsWith('ref-') ? 'rgba(25,118,210,0.92)' : 'rgba(230,81,0,0.92)';
  let hasStart = false;

  if (isLineTool && state.linePoints.length >= 1) {
    const last = state.linePoints[state.linePoints.length - 1];
    _mobileMag.updateStart(last.x, last.y, col);
    hasStart = true;
  }

  if (hasStart) {
    _mobileMag.updateEnd(p.x, p.y, col);
  } else {
    _mobileMag.updateStart(p.x, p.y, col);
    _mobileMag.hideEnd();
  }
}

// =========================================================
// MOBILE: TOUCH STATE MACHINE
// =========================================================
let _touchState = { type: null, lastDist: 0, lastMid: null, startTime: 0 };
const _PINCH_COOLDOWN_MS = 350;
let _pinchCooldownUntil = 0;
let _touchSuppressClick = false;
let _mobileAdjust = { active: false, lastCanvasPos: null };

function _getCanvasPtrFromTouch(touch) {
  return canvas.getPointer({
    clientX: touch.clientX, clientY: touch.clientY,
    pageX: touch.pageX, pageY: touch.pageY,
  });
}

function _touchOnOverlay(e) {
  const overlay = document.getElementById('drop-overlay');
  return overlay && !overlay.classList.contains('hidden') && overlay.contains(e.target);
}

// Prevent iOS bounce/zoom
wrapper.addEventListener('touchmove', e => {
  if (_touchOnOverlay(e)) return;
  if (e.touches.length >= 2 || state.tool !== 'select') {
    e.preventDefault();
  }
}, { passive: false });

if (_isTouchDevice) {
  // Capture phase: intercept touch BEFORE Fabric.js for drawing tools
  canvas.upperCanvasEl.addEventListener('touchstart', e => {
    if (!DRAWING_TOOLS.includes(state.tool)) return;
    if (!state.backgroundImage) return;
    if (e.touches.length !== 1) return;
    if (Date.now() < _pinchCooldownUntil) return;

    e.preventDefault();
    e.stopImmediatePropagation();

    _touchSuppressClick = true;
    _mobileAdjust.active = true;

    const touch = e.touches[0];
    const p = _getCanvasPtrFromTouch(touch);
    _mobileAdjust.lastCanvasPos = p;

    _showMobileCrosshair(touch.clientX, touch.clientY);
    _updateMobileMagnifiers(p);
  }, { capture: true, passive: false });

  canvas.upperCanvasEl.addEventListener('touchmove', e => {
    if (!_mobileAdjust.active || e.touches.length !== 1) return;
    e.preventDefault();
    e.stopImmediatePropagation();

    const touch = e.touches[0];
    const p = _getCanvasPtrFromTouch(touch);
    _mobileAdjust.lastCanvasPos = p;

    _showMobileCrosshair(touch.clientX, touch.clientY);

    const snapped = snapToPixel(p);
    const isLineTool = LINE_TOOLS.includes(state.tool);
    const cat = state.tool.startsWith('ref-') ? 'reference' : 'element';
    const color = categoryColor(cat);
    const isDashed = cat === 'reference';

    // Update preview for line tools
    if (isLineTool && state.linePoints.length >= 1 && state.drawingLine) {
      const pts = state.linePoints.map(pp => ({ x: pp.x, y: pp.y }));
      pts.push(snapped);
      canvas.remove(state.drawingLine);
      const opts = {
        stroke: color, strokeWidth: isDashed ? 2 : LINE_WIDTH, fill: 'transparent',
        selectable: false, evented: false, _tempDraw: true,
      };
      if (isDashed) opts.strokeDashArray = [8, 4];
      state.drawingLine = new fabric.Polyline(pts, opts);
      canvas.add(state.drawingLine);
    }

    _updateMobileMagnifiers(snapped);
    throttledRender();
  }, { capture: true, passive: false });

  canvas.upperCanvasEl.addEventListener('touchend', e => {
    if (!_mobileAdjust.active) return;
    e.stopImmediatePropagation();

    _mobileAdjust.active = false;
    _touchSuppressClick = false;
    _hideMobileCrosshair();
    haptic('light');

    const touch = e.changedTouches[0];
    const p = _getCanvasPtrFromTouch(touch);
    const snapped = snapToPixel(p);
    const cat = state.tool.startsWith('ref-') ? 'reference' : 'element';

    switch (state.tool) {
      case 'element-point': placePoint(snapped, 'element'); break;
      case 'ref-point': placePoint(snapped, 'reference'); break;
      case 'element-line': handleLineClick(snapped, 'element'); break;
      case 'ref-line': handleLineClick(snapped, 'reference'); break;
    }

    _updateFinishBtn();
    _updateMobileMagnifiers(snapped);

    // Hide magnifiers for point tools (single action)
    if (POINT_TOOLS.includes(state.tool)) {
      _mobileMag.hide();
    }
  }, { capture: true });

  // Handle measure tool taps on mobile
  canvas.upperCanvasEl.addEventListener('touchstart', e => {
    if (state.tool !== 'measure') return;
    if (!state.backgroundImage) return;
    if (e.touches.length !== 1) return;
    if (Date.now() < _pinchCooldownUntil) return;

    e.preventDefault();
    e.stopImmediatePropagation();

    const touch = e.touches[0];
    const p = _getCanvasPtrFromTouch(touch);
    const snapped = snapToPixel(p);
    handleMeasureClick(snapped);
  }, { capture: true, passive: false });

  // Select tool: allow pass-through for pan
  canvas.upperCanvasEl.addEventListener('touchstart', e => {
    if (state.tool !== 'select') return;
    if (e.touches.length !== 1) return;
    if (Date.now() < _pinchCooldownUntil) return;
    // Don't intercept — let it pass to Fabric for pan in touchmove
  }, { capture: true, passive: true });
}

// =========================================================
// PINCH + PAN (Bubbling phase)
// =========================================================
wrapper.addEventListener('touchstart', e => {
  if (_touchOnOverlay(e)) return;

  if (e.touches.length === 2) {
    e.preventDefault();
    _touchSuppressClick = true;
    if (_mobileAdjust.active) { _mobileAdjust.active = false; _hideMobileCrosshair(); }
    _touchState.type = 'pinch';
    _touchState.lastDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    _touchState.lastMid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };
    return;
  }

  if (e.touches.length === 1) {
    if (Date.now() < _pinchCooldownUntil) {
      _touchSuppressClick = true;
      _touchState.type = 'cooldown';
      return;
    }
    _touchState.type = 'single';
    _touchState.startTime = Date.now();
    _touchState.lastMid = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: false });

wrapper.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && _touchState.type === 'pinch') {
    e.preventDefault();
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const mid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };
    const factor = dist / _touchState.lastDist;
    const rect = wrapper.getBoundingClientRect();
    setZoom(canvas.getZoom() * factor, { x: mid.x - rect.left, y: mid.y - rect.top });
    const dx = mid.x - _touchState.lastMid.x;
    const dy = mid.y - _touchState.lastMid.y;
    const vpt = canvas.viewportTransform.slice();
    vpt[4] += dx; vpt[5] += dy;
    canvas.setViewportTransform(vpt);
    _touchState.lastDist = dist;
    _touchState.lastMid = mid;
    return;
  }

  if (e.touches.length === 1 && _touchState.type === 'single' && state.tool === 'select') {
    e.preventDefault();
    const t = e.touches[0];
    if (_touchState.lastMid) {
      const dx = t.clientX - _touchState.lastMid.x;
      const dy = t.clientY - _touchState.lastMid.y;
      const vpt = canvas.viewportTransform.slice();
      vpt[4] += dx; vpt[5] += dy;
      canvas.setViewportTransform(vpt);
    }
    _touchState.lastMid = { x: t.clientX, y: t.clientY };
  }
}, { passive: false });

wrapper.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    if (_touchState.type === 'pinch') {
      _pinchCooldownUntil = Date.now() + _PINCH_COOLDOWN_MS;
      _touchSuppressClick = true;
    }
    _touchState.type = null;
    _touchState.lastMid = null;
  }
}, { passive: true });

// =========================================================
// ORIENTATION CHANGE
// =========================================================
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    canvas.setWidth(wrapper.clientWidth);
    canvas.setHeight(wrapper.clientHeight);
    canvas.renderAll();
  }, 200);
});

// Prevent double-tap zoom
document.addEventListener('dblclick', e => {
  if (_isTouchDevice) e.preventDefault();
}, { passive: false });

// =========================================================
// INIT: set default tool
// =========================================================
setTool('select');
</script>
